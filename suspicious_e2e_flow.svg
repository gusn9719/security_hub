<?xml version="1.0" encoding="UTF-8"?>
<!--
  security_hub — Suspicious E2E (발표용)
  Figma 편집: 각 스텝은 id로 레이어 분리됨
  Canvas: 1300 x 420
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 420" width="1300" height="420">
  <defs>
