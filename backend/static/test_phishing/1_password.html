<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAVER 로그인</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); width: 320px; }
    h2 { text-align: center; color: #03c75a; margin: 0 0 24px; font-size: 28px; letter-spacing: -1px; }
    input { width: 100%; padding: 12px 14px; margin: 6px 0; border: 1px solid #e0e0e0; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none; }
    input:focus { border-color: #03c75a; }
    button { width: 100%; padding: 13px; background: #03c75a; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; margin-top: 10px; }
    .badge { display: block; text-align: center; margin-top: 20px; font-size: 11px; color: #bbb; border-top: 1px solid #f0f0f0; padding-top: 14px; }
    code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>NAVER</h2>
    <form method="POST" action="/test-phishing/noop">
      <input type="text" name="id" placeholder="아이디">
      <input type="password" name="pw" placeholder="비밀번호">
      <button type="submit">로그인</button>
    </form>
    <span class="badge">
      [7-B 탐지 테스트 ①] <code>form_with_password</code> → <strong>+30점</strong><br>
      Playwright가 가짜 비밀번호를 자동 주입합니다
    </span>
  </div>
</body>
</html>
